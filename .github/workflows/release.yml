# Релизный конвейер: пуш тега vX.Y.Z собирает все артефакты (через общий
# build.yml) и публикует GitHub Release. Ничего не собирается вручную на
# локальной машине — сборка воспроизводима из содержимого репозитория.
#
# Как выпустить релиз:
#   1. Обновить версию в CMakeLists.txt (project(... VERSION X.Y.Z)) и CHANGELOG.md.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Страховка от расхождения версий: тег обязан совпадать с версией в CMake.
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CMAKE_VER=$(grep -oP 'project\(DendroLog VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          if [ "$TAG" != "$CMAKE_VER" ]; then
            echo "::error::Tag v$TAG does not match CMakeLists.txt version $CMAKE_VER"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: verify-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.verify-version.outputs.version }}
      numeric-version: ${{ needs.verify-version.outputs.version }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DendroLog ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
