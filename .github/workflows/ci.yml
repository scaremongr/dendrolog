# CI на каждый push/PR: сборка, тесты и упаковка через переиспользуемый
# build.yml. Установщик, portable ZIP и AppImage доступны как артефакты
# запуска (вкладка Actions → выбранный run → Artifacts), хранятся 30 дней.
# Версия dev-сборок помечается номером запуска: DendroLog-dev-57-setup.exe.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: dev-${{ github.run_number }}
